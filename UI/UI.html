      function wireAddNewPanel() {
        const browseBtn = document.getElementById("addNewBrowseBtn");
        const fileBrowse = document.getElementById("addNewFileBrowse");
        const filenameInput = document.getElementById("addNewFilename");
        const titleInput = document.getElementById("addNewTitle");
        const yearInput = document.getElementById("addNewYear");
        const movieTypeSel = document.getElementById("addNewMovieType");
        const resolutionSel = document.getElementById("addNewResolution");
        const qualitySel = document.getElementById("addNewQuality");
        const storageCaseSel = document.getElementById("addNewStorageCase");
        const storageHddSel = document.getElementById("addNewStorageHdd");
        const storageSizeInput = document.getElementById("addNewStorageSize");
        const saveBtn = document.getElementById("addNewSaveBtn");
        const cancelBtn = document.getElementById("addNewCancelBtn");
        const statusEl = document.getElementById("addNewStatus");

        function applyParsed(filename, force = false) {
          const parsed = parseFilenameForForm(filename);
          if (force || !titleInput.value) titleInput.value = parsed.title;
          if (force || !yearInput.value) yearInput.value = parsed.year;
          if (resolutionSel && parsed.resolution) {
            const match = [...resolutionSel.options].find(
              (o) => o.value.toLowerCase() === parsed.resolution.toLowerCase(),
            );
            if (match) resolutionSel.value = match.value;
          }
          if (qualitySel && parsed.quality) qualitySel.value = parsed.quality;
        }

        if (browseBtn && fileBrowse) {
          browseBtn.addEventListener("click", () => fileBrowse.click());
          fileBrowse.addEventListener("change", () => {
            const file = fileBrowse.files[0];
            if (!file) return;
            const filenameNoExt = file.name.replace(/\.[^.]+$/, "");
            filenameInput.value = filenameNoExt;
            // Force-fill all parsed fields when a file is chosen
            titleInput.value = "";
            yearInput.value = "";
            applyParsed(filenameNoExt, true);
          });
        }

        if (filenameInput) {
          // Auto-fill empty fields when user manually types/pastes a filename and leaves
          filenameInput.addEventListener("change", () => {
            applyParsed(filenameInput.value, false);
          });
        }

        if (movieTypeSel) {
          movieTypeSel.addEventListener("change", () => {
            applyMovieTypeStorageRuleToInputs(
              movieTypeSel.value,
              storageCaseSel,
              storageHddSel,
            );
          });
        }

        if (cancelBtn) {
          cancelBtn.addEventListener("click", () => {
            state.isAddingNew = false;
            el.detailsContainer.innerHTML = statusMarkup(
              t("details.selectPrompt"),
            );
            updateDetailsActionButtons();
          });
        }

        if (saveBtn) {
          saveBtn.addEventListener("click", async () => {
            const filename = filenameInput?.value.trim() || "";
            const title = titleInput?.value.trim() || "";
            if (!title && !filename) {
              statusEl.textContent = "Please enter a title or filename.";
              statusEl.style.color = "#ef4444";
              return;
            }
            statusEl.textContent = "Saving\u2026";
            statusEl.style.color = "var(--muted)";
            saveBtn.disabled = true;

            const payload = {
              filename,
              title,
              year: yearInput?.value.trim() || "",
              "Movie Type":
                document.getElementById("addNewMovieType")?.value || "",
              resolution: resolutionSel?.value || "",
              Quality: qualitySel?.value || "",
              storageCase:
                document.getElementById("addNewStorageCase")?.value || "",
              storageHdd:
                document.getElementById("addNewStorageHdd")?.value || "",
              storageSize: storageSizeInput?.value.trim() || "",
            };

            try {
              const result = await callApi("/api/addMovie", "POST", payload);
              state.isAddingNew = false;
              applyBackendPayload(result);

              // Select the newly added movie and navigate to its page.
              if (result.newDocId) {
                const parts = result.newDocId.split("_");
                const newRowIdx = parseInt(parts[parts.length - 1], 10);
                const newItem = state.movies.find(
                  (m) => Number(m.rowIndex) === newRowIdx,
                );
                if (newItem) {
                  state.searchTerm = "";
                  if (el.searchInput) el.searchInput.value = "";
                  if (el.suggestionsDropdown)
                    el.suggestionsDropdown.classList.remove("show");
                  applyFilterAndRender(true, false);

                  const pageSize =
                    state.viewMode === "grid" ? GRID_PAGE_SIZE : LIST_PAGE_SIZE;
                  const itemIdx = state.filtered.findIndex(
                    (i) =>
                      Number(i.rowIndex) === newRowIdx &&
                      i.sheetType === "movies",
                  );
                  if (itemIdx >= 0)
                    state.page = Math.floor(itemIdx / pageSize) + 1;
                  selectItemByKey(newItem.key, { focusContainer: true });
                }
              }
            } catch (error) {
              statusEl.textContent = error.message || "Failed to save.";
              statusEl.style.color = "#ef4444";
              saveBtn.disabled = false;
            }
          });
        }
      }

      function refreshSelectedItemCard(item) {
        const selectedNode = Array.from(
          el.itemsContainer.querySelectorAll(".item"),
        ).find((node) => node.dataset.key === item.key);
        if (!selectedNode) return;

        const titleEl = selectedNode.querySelector(".item-title");
        if (titleEl) titleEl.textContent = item.title || "";

        if (state.viewMode === "grid") {
          const metaEl = selectedNode.querySelector(".grid-info .item-meta");
          if (metaEl)
            metaEl.textContent = `${item.year || t("values.dash")} • ${item.resolution || t("values.notAvailable")}`;
          const poster = selectedNode.querySelector(".grid-poster");
          if (poster && item.poster) {
            poster.setAttribute("data-poster-url", item.poster);
            poster.setAttribute("data-imdb-id", item.imdbId || "");
            poster.className = "grid-poster placeholder poster-loading";
            poster.textContent = t("poster.loading");
            loadGridPosters();
          }
        } else {
          const infoCol = selectedNode.querySelector("div");
          const infoMetaRows = infoCol
            ? infoCol.querySelectorAll(".item-meta")
            : [];
          const summaryMeta = infoMetaRows.length
            ? infoMetaRows[infoMetaRows.length - 1]
            : null;
          if (summaryMeta) {
            summaryMeta.textContent = `${item.language || t("values.unknown")} • ${item.resolution || t("values.notAvailable")} • ${item.year || t("values.dash")}`;
          }
          const hddMeta = selectedNode.querySelector(":scope > .item-meta");
          if (hddMeta)
            hddMeta.textContent = item.storageHdd || t("values.dash");
          const poster = selectedNode.querySelector(".list-poster");
          if (poster && item.poster) {
            poster.setAttribute("data-poster-url", item.poster);
            poster.setAttribute("data-imdb-id", item.imdbId || "");
            poster.className = "list-poster placeholder poster-loading";
            poster.textContent = t("poster.loading");
            loadListPosters();
          }
        }
      }

      async function renderDetails() {
        if (state.isAddingNew) return;
        const item = getSelectedItem();
        if (!item) {
          el.detailsContainer.innerHTML = statusMarkup(
            t("details.selectPrompt"),
          );
          updateDetailsActionButtons();
          return;
        }

        const selectedKeyAtStart = item.key;
        const hasPoster = !!(item.poster || item.imdbId);
        const effectiveImdbId = getEffectiveImdbId(item);
        const metadataCollapsed = state.isMetadataCollapsed;
        const plotText = getPlotFromItem(item);

        // Render card immediately; poster slot shows shimmer if URL exists
        const posterSlot = hasPoster
          ? `<div id="posterWrap" class="poster placeholder poster-loading">${escapeHtml(t("poster.loadingPoster"))}</div>`
          : `<div id="posterWrap" class="poster placeholder">${escapeHtml(t("poster.noPoster"))}</div>`;

        const valueCell = (field, fallback = t("values.dash")) => {
          if (field === "language") {
            return `<div>${escapeHtml(getDisplayLanguage(item))}</div>`;
          }
          if (!state.isEditingDetails) {
            let display = item[field] || fallback;
            return `<div>${escapeHtml(display)}</div>`;
          }
          if (field === "Movie Type") {
            const opts = ["EN", "HN", "AN", "FN", "RG", "DC", "3D"]
              .map(
                (o) =>
                  `<option value="${o}"${item[field] === o ? " selected" : ""}>${o}</option>`,
              )
              .join("");
            return `<select class="detail-input" data-edit-field="Movie Type">${opts}</select>`;
          }
          if (field === "resolution") {
            const opts = ["1080p", "720p", "2160p", "SD"]
              .map(
                (option) =>
                  `<option value="${option}"${item[field] === option ? " selected" : ""}>${option}</option>`,
              )
              .join("");
            return `<select class="detail-input" data-edit-field="resolution">${opts}</select>`;
          }
          if (field === "Quality") {
            const current = normalize(item[field]).toLowerCase();
            const opts = ["", "hevc", "x264"]
              .map((option) => {
                const label = option || "-";
                return `<option value="${option}"${current === option ? " selected" : ""}>${label}</option>`;
              })
              .join("");
            return `<select class="detail-input" data-edit-field="Quality">${opts}</select>`;
          }
          if (field === "storageHdd") {
            const opts = ["M01", "M03", "M04", "M05", "M06", "M09", "M10"]
              .map(
                (option) =>
                  `<option value="${option}"${item[field] === option ? " selected" : ""}>${option}</option>`,
              )
              .join("");
            return `<select class="detail-input" data-edit-field="storageHdd">${opts}</select>`;
          }
          if (field === "storageCase") {
            const opts = ["MS1", "MS2", "MS3", "MS4", "MS5"]
              .map(
                (option) =>
                  `<option value="${option}"${item[field] === option ? " selected" : ""}>${option}</option>`,
              )
              .join("");
            return `<select class="detail-input" data-edit-field="storageCase">${opts}</select>`;
          }
          return `<input class="detail-input" data-edit-field="${field}" value="${escapeHtml(item[field] || "")}" />`;
        };

        el.detailsContainer.innerHTML = `
				<div class="detail-card">
					<div class="poster-column">
						${posterSlot}
					</div>
					<div class="detail-content">
						<h2 class="detail-title">${escapeHtml(item.title)}</h2>
						<div class="detail-grid">
							<div class="label">${escapeHtml(t("details.yearOfRelease"))}</div>${valueCell("year")}
							<div class="label">${escapeHtml(t("details.filename"))}</div>${valueCell("filename")}
							<div class="label">${escapeHtml(t("details.movieType"))}</div>${valueCell("Movie Type")}
							<div class="label">${escapeHtml(t("details.resolution"))}</div>${valueCell("resolution")}
							<div class="label">${escapeHtml(t("details.quality"))}</div>${valueCell("Quality")}
							<div class="label">${escapeHtml(t("details.language"))}</div>${valueCell("language")}
							<div class="label">${escapeHtml(t("details.storageCase"))}</div>${valueCell("storageCase")}
							<div class="label">${escapeHtml(t("details.storageHdd"))}</div>${valueCell("storageHdd")}
							<div class="label">${escapeHtml(t("details.storageSize"))}</div>${valueCell("storageSize")}
							<div class="label">${escapeHtml(t("details.myRating"))}</div>${valueCell("myRating")}
							<div class="label">${escapeHtml(t("details.imdbRating"))}</div><div>${(() => {
                const meta = getMetadataObject(item);
                const rating =
                  meta && meta.imdbRating && meta.imdbRating !== "N/A"
                    ? meta.imdbRating
                    : null;
                const votes =
                  meta && meta.imdbVotes && meta.imdbVotes !== "N/A"
                    ? meta.imdbVotes
                    : null;
                if (rating && votes) return escapeHtml(rating + " / " + votes);
                if (rating) return escapeHtml(rating);
                return escapeHtml(t("values.dash"));
              })()}</div>
						</div>
					</div>
					<div class="plot-section">
						<div class="detail-side-label">${escapeHtml(t("details.plot"))}</div>
						${
              state.isEditingDetails
                ? `<textarea class="plot-input" data-edit-field="plot" placeholder="${escapeHtml(t("details.enterPlot"))}">${escapeHtml(plotText)}</textarea>`
                : `<div class="plot-text">${escapeHtml(plotText || t("details.noPlot"))}</div>`
            }
					</div>
					<div class="api-details-row">
						<div class="metadata-header">
							<div class="detail-side-label">${escapeHtml(t("details.metadata"))}</div>
							<button id="toggleMetadataBtn" class="btn">${escapeHtml(metadataCollapsed ? t("details.showMetadata") : t("details.hideMetadata"))}</button>
						</div>
						${
              metadataCollapsed
                ? `<div class="item-meta">${escapeHtml(t("details.metadataCollapsed"))}</div>`
                : item.metadataJson
                  ? `<pre class="json-block">${escapeHtml(item.metadataJson)}</pre>`
                  : `<div class="item-meta">${escapeHtml(t("details.noMetadata"))}</div>`
            }
						<div class="metadata-editor">
							<input id="metadataImdbInput" type="text" value="${escapeHtml(effectiveImdbId)}" placeholder="${escapeHtml(t("details.imdbPlaceholder"))}" />
							<button id="fetchMetadataBtn" class="btn">${escapeHtml(t("details.fetchLatest"))}</button>
						</div>
						<div id="metadataStatus" class="metadata-status">${state.hasUnsavedChanges ? escapeHtml(t("details.unsavedChanges")) : ""}</div>
					</div>
				</div>
			`;

        if (state.isEditingDetails) {
          el.detailsContainer
            .querySelectorAll("[data-edit-field]")
            .forEach((input) => {
              const field = input.getAttribute("data-edit-field");
              if (field === "Movie Type") {
                input.addEventListener("change", (e) => {
                  const nextValue = e.target.value;
                  onDetailFieldInput(item, "Movie Type", nextValue);
                  const storageCaseInput = el.detailsContainer.querySelector(
                    '[data-edit-field="storageCase"]',
                  );
                  const storageHddInput = el.detailsContainer.querySelector(
                    '[data-edit-field="storageHdd"]',
                  );
                  if (
                    applyMovieTypeStorageRuleToInputs(
                      nextValue,
                      storageCaseInput,
                      storageHddInput,
                    )
                  ) {
                    onDetailFieldInput(
                      item,
                      "storageCase",
                      storageCaseInput?.value || "",
                    );
                    onDetailFieldInput(
                      item,
                      "storageHdd",
                      storageHddInput?.value || "",
                    );
                  }
                });
                return;
              }
              const handler = (e) => {
                onDetailFieldInput(item, field, e.target.value);
              };
              input.addEventListener("input", handler);
              input.addEventListener("change", handler);
            });
        }

        // Kick off async poster load + cache (does not block UI)
        if (hasPoster) {
          loadAndCachePoster(item.poster, selectedKeyAtStart, item.imdbId);
        }

        wireMetadataActions(item);
        updateDetailsActionButtons();
      }

      function beginPageLock() {
        const lock = {
          page: state.page,
          selectedKey: state.selectedKey,
        };
        state.pageLock = lock;
        return lock;
      }

      function restorePageLock(lock = state.pageLock) {
        if (!lock) return;
        const pages = totalPages();
        state.page = Math.min(Math.max(1, lock.page), pages);
        state.selectedKey = lock.selectedKey;
      }

      function endPageLock(lock = state.pageLock) {
        if (!lock) return;
        if (state.pageLock === lock) {
          state.pageLock = null;
        }
      }

      function setActiveTab(tab) {
        if (IS_TAB_LOCKED && tab !== state.activeTab) return;
        state.isAddingNew = false;
        state.activeTab = tab;
        state.searchTerm = "";
        el.searchInput.value = "";
        state.isMetadataCollapsed = true;
        state.selectedKey = null;
        state.selectedItemKeys.clear();

        el.tabMovies.classList.toggle("active", tab === "movies");
        el.tabSeries.classList.toggle("active", tab === "series");

        if (el.addMovieBtn) {
          el.addMovieBtn.style.display = tab === "movies" ? "" : "none";
        }

        applyFilterAndRender(true);
      }

      function setViewMode(mode) {
        state.viewMode = mode;
        localStorage.setItem(UI_VIEW_MODE_STORAGE_KEY, mode);
        el.listViewBtn.classList.toggle("primary", mode === "list");
        el.gridViewBtn.classList.toggle("primary", mode === "grid");
        render();
        renderDetails();
      }

      function bindEvents() {
        document.addEventListener("keydown", (event) => {
          if (
            !["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(
              event.key,
            )
          )
            return;
          if (state.isEditingDetails || isInteractiveElement(event.target))
            return;
          if (moveSelectionWithArrow(event.key)) {
            event.preventDefault();
          }
        });

        if (!IS_TAB_LOCKED) {
          el.tabMovies.addEventListener("click", () => setActiveTab("movies"));
          el.tabSeries.addEventListener("click", () => setActiveTab("series"));
        }

        if (el.fetchAllMetadataBtn) {
          el.fetchAllMetadataBtn.addEventListener("click", async () => {
            await fetchAllMissingMetadataForSelectedOnPage();
          });
        }

        if (el.deleteSelectedBtn) {
          el.deleteSelectedBtn.addEventListener("click", async () => {
            await deleteSelectedItemsOnCurrentPage();
          });
        }

        if (el.addMovieBtn) {
          el.addMovieBtn.addEventListener("click", () => {
            if (state.activeTab !== "movies") return;
            state.isAddingNew = true;
            state.selectedKey = null;
            state.isEditingDetails = false;
            renderAddNewPanel();
            updateDetailsActionButtons();
          });
        }

        if (el.selectAllPageBtn) {
          el.selectAllPageBtn.addEventListener("click", () => {
            selectAllItemsOnCurrentPage();
          });
        }

        el.listViewBtn.addEventListener("click", () => setViewMode("list"));
        el.gridViewBtn.addEventListener("click", () => setViewMode("grid"));

        el.detailEditBtn.addEventListener("click", () => {
          if (!getSelectedItem()) return;
          setEditMode(true);
        });

        el.detailSaveBtn.addEventListener("click", async () => {
          flushDetailFormEdits();
          if (!state.hasUnsavedChanges) return;
          const pageLock = beginPageLock();
          state.suppressNextPageReset = true;
          try {
            await saveWorkbookToFile({
              preservedPage: pageLock.page,
              preservedSelection: pageLock.selectedKey,
            });
            restorePageLock(pageLock);
            render();
            renderDetails();
          } finally {
            endPageLock(pageLock);
            setTimeout(() => {
              state.suppressNextPageReset = false;
            }, 0);
          }
        });

        el.detailCancelBtn.addEventListener("click", async () => {
          if (state.hasUnsavedChanges) {
            const ok = confirm(t("confirm.discardUnsaved"));
            if (!ok) return;
            await loadWorkbook();
          }
          state.isEditingDetails = false;
          updateDetailsActionButtons();
          renderDetails();
        });

        el.searchInput.addEventListener("input", () => {
          generateSuggestions(el.searchInput.value);
        });

        if (el.titleOnlyCheckbox) {
          state.titleOnlySearch = !!el.titleOnlyCheckbox.checked;
          el.titleOnlyCheckbox.addEventListener("change", () => {
            state.titleOnlySearch = !!el.titleOnlyCheckbox.checked;
            generateSuggestions(el.searchInput.value);
            applyFilterAndRender(true);
          });
        }

        el.searchInput.addEventListener("keydown", (event) => {
          if (event.key === "ArrowDown" && state.suggestions.length) {
            event.preventDefault();
            state.activeSuggestionIndex = Math.min(
              state.activeSuggestionIndex + 1,
              state.suggestions.length - 1,
            );
            renderSuggestions();
          } else if (event.key === "ArrowUp" && state.suggestions.length) {
            event.preventDefault();
            state.activeSuggestionIndex = Math.max(
              state.activeSuggestionIndex - 1,
              -1,
            );
            renderSuggestions();
          } else if (event.key === "Enter") {
            if (state.activeSuggestionIndex >= 0 && state.suggestions.length) {
              el.searchInput.value =
                state.suggestions[state.activeSuggestionIndex];
              state.searchTerm = el.searchInput.value;
              el.suggestionsDropdown.classList.remove("show");
              applyFilterAndRender(true);
            } else {
              state.searchTerm = el.searchInput.value;
              el.suggestionsDropdown.classList.remove("show");
              applyFilterAndRender(true);
            }
          } else if (event.key === "Escape") {
            el.suggestionsDropdown.classList.remove("show");
          }
        });

        el.searchBtn.addEventListener("click", () => {
          state.searchTerm = el.searchInput.value;
          el.suggestionsDropdown.classList.remove("show");
          applyFilterAndRender(true);
        });

        el.clearBtn.addEventListener("click", () => {
          state.searchTerm = "";
          el.searchInput.value = "";
          el.suggestionsDropdown.classList.remove("show");
          applyFilterAndRender(true);
        });

        // Hide suggestions when clicking outside
        document.addEventListener("click", (e) => {
          if (
            e.target !== el.searchInput &&
            !el.suggestionsDropdown.contains(e.target)
          ) {
            el.suggestionsDropdown.classList.remove("show");
          }
        });

        el.firstBtn.addEventListener("click", () => {
          navigateToPage(1);
        });

        el.prevBtn.addEventListener("click", () => {
          navigateToPage(state.page - 1);
        });

        el.nextBtn.addEventListener("click", () => {
          navigateToPage(state.page + 1);
        });

        el.lastBtn.addEventListener("click", () => {
          navigateToPage(totalPages());
        });

        const jumpToTypedPage = () => {
          const pages = totalPages();
          const raw = Number(el.gotoPageInput.value || 0);
          if (!raw || Number.isNaN(raw)) return;
          navigateToPage(Math.min(Math.max(1, Math.floor(raw)), pages));
        };

        el.itemsContainer.addEventListener(
          "wheel",
          (event) => {
            const pages = totalPages();
            if (pages <= 1) return;
            if (
              Math.abs(event.deltaY) < Math.abs(event.deltaX) ||
              Math.abs(event.deltaY) < 8
            )
              return;

            const delta = event.deltaY > 0 ? 1 : -1;
            const target = Math.min(Math.max(1, state.page + delta), pages);
            if (target === state.page) return;

            const now = Date.now();
            if (now - state.lastWheelPageNavAt < 220) {
              event.preventDefault();
              return;
            }

            state.lastWheelPageNavAt = now;
            event.preventDefault();
            navigateToPage(target);
          },
          { passive: false },
        );

        el.gotoPageBtn.addEventListener("click", jumpToTypedPage);
        el.gotoPageInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            jumpToTypedPage();
          }
        });
      }

      async function initApp() {
        try {
          console.log("Starting app initialization...");
          await waitForBackendReady();
          await loadUiResources();
          applyStaticStrings();
          applyTabModeUi();
          setActiveTab(state.activeTab);
          bindEvents();
          el.listViewBtn.classList.toggle("primary", state.viewMode === "list");
          el.gridViewBtn.classList.toggle("primary", state.viewMode === "grid");
          updateDetailsActionButtons();
          console.log("Backend ready, loading workbook...");
          await loadWorkbook();
          console.log("Workbook loaded successfully");
        } catch (error) {
          const msg =
            error?.message || String(error) || t("status.unknownInitError");
          console.error("Init error:", msg, error);
          el.itemsContainer.innerHTML = `<div class="status" style="color: #ef4444; padding: 20px; white-space: pre-wrap; word-break: break-word; font-family: monospace; font-size: 12px;">${escapeHtml(t("status.errorPrefix", { message: msg }))}</div>`;
          el.countInfo.textContent = t("collection.zeroItems");
        }
      }

      initApp();
    </script>
  </body>
</html>
